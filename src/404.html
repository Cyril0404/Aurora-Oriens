<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Aurora Oriens</title>
  <meta name="description" content="The page you're looking for doesn't exist.">
  <link rel="canonical" href="https://www.auroraoriens.com/404.html">
  <meta property="og:title" content="Page Not Found — Aurora Oriens">
  <meta property="og:description" content="The page you're looking for doesn't exist.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-ivory: #FFFFF0;
      --color-ivory-warm: #FAF8F5;
      --color-ink: #1A1A1A;
      --color-ink-light: #4A4A4A;
      --color-gold: #C9A84C;
      --color-gold-light: #E8D5A3;
      --color-gray-light: #F5F3EF;
      --color-gray: #E0DDD8;
      --font-serif: 'Playfair Display', Georgia, serif;
      --font-sans: 'Inter', -apple-system, sans-serif;
      --transition-fast: 0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; }

    body {
      font-family: var(--font-sans);
      background: var(--color-ink);
      color: var(--color-ivory);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    a { text-decoration: none; color: inherit; }

    /* Nav — sticky */
    .nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(26,26,26,0.96);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,240,0.1);
    }
    .nav__inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav__logo {
      font-family: var(--font-serif);
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--color-ivory);
    }
    .nav__links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav__links a {
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,240,0.5);
      transition: color var(--transition-fast);
    }
    .nav__links a:hover { color: var(--color-gold); }

    /* 404 content — black bg, brand quote */
    .not-found {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 2rem;
    }
    .not-found__eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--color-gold);
      margin-bottom: 2.5rem;
    }
    .not-found__quote {
      font-family: var(--font-serif);
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 0.75rem;
      max-width: 18ch;
      color: var(--color-ivory);
    }
    .not-found__sub {
      font-size: 0.85rem;
      color: rgba(255,255,240,0.4);
      margin-bottom: 3rem;
      letter-spacing: 0.04em;
    }

    .btn--primary {
      padding: 0.85rem 2.5rem;
      background: transparent;
      color: var(--color-ivory);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,240,0.3);
      cursor: pointer;
      font-family: var(--font-sans);
      transition: all 0.2s;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn--primary:hover {
      border-color: var(--color-gold);
      color: var(--color-gold);
    }

    /* Footer */
    .footer {
      background: transparent;
      border-top: 1px solid rgba(255,255,240,0.08);
      padding: 3rem 2rem;
    }
    .footer__inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer__brand { font-family: var(--font-serif); font-size: 1.1rem; color: rgba(255,255,240,0.6); }
    .footer__copy { font-size: 0.72rem; color: rgba(255,255,240,0.3); }

    @media (max-width: 768px) {
      .nav__links { display: none; }
      .footer__inner { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a href="主页设计.html" class="nav__logo">Aurora Oriens</a>
    <ul class="nav__links">
      <li><a href="主页设计.html">Home</a></li>
      <li><a href="products.html">Collections</a></li>
      <li><a href="about.html">Our Story</a></li>
      <li><a href="#">Bespoke</a></li>
    </ul>
  </div>
</nav>

<section class="not-found">
  <p class="not-found__eyebrow">404 · Page not found</p>
  <h1 class="not-found__quote">Some paths<br>are meant to wander</h1>
  <p class="not-found__sub">The page you're looking for doesn't exist or has been moved.</p>
  <a href="主页设计.html" class="btn--primary">Return Home ✦</a>
</section>

<footer class="footer">
  <div class="footer__inner">
    <span class="footer__brand">Aurora Oriens</span>
    <span class="footer__copy">© 2026 Aurora Oriens. All rights reserved.</span>
  </div>
</footer>

</body>
</html>
